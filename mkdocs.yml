site_name: VoxelKit
site_description: Inspect, preview, and QA-check multidimensional imaging data from one unified Python and CLI workflow.
site_url: https://arsalaanahmad.github.io/VoxelKit/
repo_url: https://github.com/ArsalaanAhmad/VoxelKit
repo_name: ArsalaanAhmad/VoxelKit

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Library Reference:
    - Overview: library/index.md
    - inspect_file: library/inspect.md
    - preview_file: library/preview.md
    - report_file: library/report.md
    - report_batch: library/batch.md
    - Embedding Analysis: library/embedding.md
  - CLI Reference:
    - Overview: cli/index.md
    - inspect: cli/inspect.md
    - preview: cli/preview.md
    - report: cli/report.md
    - report-batch: cli/batch.md
    - embed-report: cli/embed-report.md
    - embed-preview: cli/embed-preview.md
    - gui: cli/gui.md
  - REST API:
    - Overview: api/index.md
    - NIfTI endpoints: api/nifti.md
    - HDF5 endpoints: api/h5.md
    - TIFF endpoints: api/tiff.md
    - Embedding endpoints: api/embedding.md
  - QA Warnings: qa-warnings.md
  - Contributing:
    - How to Contribute: contributing/index.md
    - Reporting Issues: contributing/issues.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/voxelkit_github_banner.svg
  favicon: assets/voxelkit_github_banner.svg
  palette:
    - scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - toc.follow

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

hooks:
  - hooks/rename_sitemap.py

plugins:
  - search

# ── Analytics ─────────────────────────────────────────────────────────────────
# Replace G-XXXXXXXXXX with your actual GA4 Measurement ID from
# https://analytics.google.com → Admin → Data Streams → your stream → Measurement ID
extra:
  analytics:
    provider: google
    property: G-XXXXXXXXXX   # <-- replace this
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ArsalaanAhmad/VoxelKit
    - icon: fontawesome/solid/box-open
      link: https://pypi.org/project/voxelkit/
    - icon: fontawesome/solid/quote-right
      link: https://doi.org/10.5281/zenodo.19774569

extra_css:
  - stylesheets/extra.css
